spring:
  application:
    name: clinica-api

  profiles:
    active: h2

  datasource:
    url: jdbc:h2:mem:clinica_db;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8081